name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate plugin invariants
        run: python3 scripts/validate-plugin.py
